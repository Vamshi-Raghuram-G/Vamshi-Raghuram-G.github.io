<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Data Science Portfolio</title>
    <style>
        :root {
            --primary-light: #F8F9FA;
            --secondary-light: #E9ECEF;
            --accent-light: #DEE2E6;
            --text-light: #212529;
            --button-bg-light: #495057;
            --button-hover-light: #6C757D;

            --primary-dark: #212529;
            --secondary-dark: #343A40;
            --accent-dark: #495057;
            --text-dark: #E9ECEF;
            --button-bg-dark: #ADB5BD;
            --button-hover-dark: #DEE2E6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--primary-light);
            color: var(--text-light);
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            transition: all 0.3s ease-in-out;
        }

        header {
            position: fixed;
            width: 100%;
            background: var(--secondary-light);
            padding: 10px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease-in-out;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            gap: 20px;
        }

        .nav-button {
            text-decoration: none;
            color: var(--text-light);
            font-weight: bold;
            padding: 8px 12px;
            transition: 0.3s;
            position: relative;
            font-size: 16px;
        }

        .nav-button::after {
            content: "";
            display: block;
            width: 0;
            height: 3px;
            background: var(--button-bg-light);
            transition: width 0.3s;
            position: absolute;
            left: 50%;
            bottom: -5px;
            transform: translateX(-50%);
        }

        .nav-button:hover::after {
            width: 100%;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .toggle-switch {
            width: 45px;
            height: 22px;
            background: var(--button-bg-light);
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-switch::before {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 4px;
            transform: translateY(-50%);
            transition: 0.3s;
        }

        .dark-mode .toggle-switch {
            background: var(--button-bg-dark);
        }

        .dark-mode .toggle-switch::before {
            left: 23px;
        }

        section {
            padding: 80px 20px;
        }

        .project-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .project {
            background: var(--accent-light);
            padding: 20px;
            border-radius: 10px;
            width: 45%;
            transition: transform 0.3s;
            color: var(--text-light);
        }

        .project:hover {
            transform: scale(1.05);
        }

        .project-button {
            text-decoration: none;
            color: white;
            background: var(--button-bg-light);
            padding: 10px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 10px;
            transition: 0.3s;
        }

        .project-button:hover {
            background: var(--button-hover-light);
        }

        .resume-button, .social-button {
            text-decoration: none;
            color: white;
            background: var(--button-bg-light);
            padding: 12px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
            transition: 0.3s;
        }

        .resume-button:hover, .social-button:hover {
            background: var(--button-hover-light);
        }

        footer {
            background: var(--secondary-light);
            padding: 20px;
            margin-top: 40px;
            color: var(--text-light);
        }

        .dark-mode {
            background-color: var(--primary-dark);
            color: var(--text-dark);
        }

        .dark-mode header, .dark-mode footer {
            background: var(--secondary-dark);
            color: var(--text-dark);
        }

        .dark-mode .nav-button {
            color: var(--text-dark);
        }

        .dark-mode .nav-button::after {
            background: var(--button-bg-dark);
        }

        .dark-mode .resume-button, .dark-mode .social-button, .dark-mode .project-button {
            background: var(--button-bg-dark);
            color: var(--text-dark);
        }

        .dark-mode .project {
            background: var(--accent-dark);
            color: var(--text-dark);
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: center;
                padding: 8px;
            }

            nav ul {
                flex-direction: column;
                gap: 8px;
            }

            .nav-button {
                font-size: 14px;
                padding: 6px 10px;
            }

            .toggle-container {
                flex-direction: column;
                align-items: center;
                gap: 5px;
                font-size: 12px;
                margin-top: 5px;
            }

            .toggle-switch {
                width: 40px;
                height: 20px;
            }

            .toggle-switch::before {
                width: 16px;
                height: 16px;
            }

            .dark-mode .toggle-switch::before {
                left: 20px;
            }

            .project {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="#about" class="nav-button">About</a></li>
                <li><a href="#projects" class="nav-button">Projects</a></li>
                <li><a href="#resume" class="nav-button">Resume</a></li>
                <li><a href="#contact" class="nav-button">Find Me Online</a></li>
            </ul>
        </nav>
        <div class="toggle-container">
            <span>Dark Mode</span>
            <div class="toggle-switch" onclick="toggleDarkMode()"></div>
        </div>
    </header>

    <script>
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>
</html>
